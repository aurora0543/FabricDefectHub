# ============================================================================
# Anomalib (PatchCore / PaDiM / RD4AD / EfficientAD / SuperSimpleNet)
# experiment config example.
#
# Usage (configuration-driven, not command-line flags):
#     from fabric_defect_hub.models.anomalib import run_from_yaml
#     result = run_from_yaml("configs/models/anomalib_example.yaml")
#     print(result.metrics)                    # {'image_auroc': ..., 'pixel_aupro': ...}
#     print(result.registered_artifact.path)    # stable storage path of the trained checkpoint
#
# Only write the fields you want to change; any train.model_kwargs key you
# don't set falls back to the fabric preset
# (models/anomalib/presets.py::MODEL_PRESETS).
#
# Two structural differences from ultralytics_example.yaml /
# torchvision_example.yaml (not oversights — dictated by this backend's own
# shape; see the module docstring in models/anomalib/config.py):
#   1. data has train_selection / test_selection, not train/val — anomalib's
#      own Folder data structure is train/good + test/{good,defect}; there
#      is no "validation set" concept.
#   2. There is no native metric extraction like val.batch_size —
#      AnomalibAdapter has no `.validate()`; "validation" here is predict()
#      followed by feeding its output to evaluation.anomaly.AnomalyEvaluator,
#      two steps stitched together.
# ============================================================================

# ---- Model: pick one ----
model:
  name: PatchCore   # PatchCore | PaDiM | RD4AD | EfficientAD | SuperSimpleNet | WinCLIP (case-insensitive)
  # WinCLIP is zero-shot by default (needs no training images); pass
  # train.model_kwargs: {k_shot: 5} to use few-shot normal references instead.

# ---- Data: read from ZJULeaperDataset at runtime and staged into a temporary MVTec-style directory ----
# dataset_root is left unset on purpose: `fdh train` falls back to this
# project's own data/ZJU-Leaper symlink (see training.DEFAULT_DATASET_ROOTS),
# which is set up the same way on every machine that has this dataset staged.
# Override with --dataset-root, or set ${ZJU_LEAPER_ROOT} and uncomment below,
# to point at a different location.
data:
  dataset: zju-leaper
  # dataset_root: ${ZJU_LEAPER_ROOT}
  train_selection:        # training uses normal samples only (PatchCore et al. train one-class)
    split: train
    pattern: [pattern1, pattern2, pattern3, pattern4]   # spread the low-shot budget across textures instead of only pattern1's plain white background
    num_samples: 300
    use_defect: false      # key: never introduce defective images into the training set
    task: anomaly
    seed: 0
  test_selection:          # test set mixes normal + defective, used to compute AUROC/AUPRO
    split: test
    pattern: [pattern1, pattern2, pattern3, pattern4]
    num_samples: 100
    use_defect: true
    defect_ratio: 0.5
    task: anomaly
    seed: 0
  # Alternative: when you already have an MVTec-style dataset on disk, use
  # datamodule_kwargs instead of dataset (in that case the val stage's
  # metric computation is skipped, since there is no Sample list to
  # evaluate against — see the note in pipeline.py).
  # datamodule_kwargs:
  #   root: /path/to/mvtec/bottle
  #   normal_dir: train/good
  #   normal_test_dir: test/good
  #   abnormal_dir: test/defect
  #   mask_dir: ground_truth/defect

# ---- Training: model_kwargs overrides the fabric preset, engine_kwargs is passed to the anomalib Engine ----
train:
  enabled: true
  model_kwargs: {}          # e.g. PatchCore: {coreset_sampling_ratio: 0.1, num_neighbors: 9}
  engine_kwargs:
    max_epochs: 1            # PatchCore/PaDiM need no gradient training; 1 epoch is enough to fit
    accelerator: cpu         # omit to let anomalib auto-select; explicit cpu is safer without CUDA
  num_workers: 0              # see config.py: the staged directory is transient symlinks, and worker subprocesses have a shutdown race

# ---- Validation: predict() + AnomalyEvaluator (not a native .validate()) ----
val:
  enabled: true
  output_dir: artifacts/anomaly_maps/patchcore_pattern1-4   # stores pixel-level anomaly_map, used for pixel AUROC/AUPRO; set to null if pixel metrics aren't needed
  max_pixels: 1000000
  max_aupro_images: 50
  seed: 0

# ---- Inference defaults (used by AnomalibAdapter.predict) ----
predict:
  output_dir: null   # leave empty if only image-level scores are needed, no pixel heatmap

# ---- Export (optional, after training) ----
export:
  enabled: false
  formats: [torch]   # torch | onnx | openvino (anomalib.deploy.ExportType)

# ---- Run directory / model registry ----
checkpoint:
  default_root_dir: results/fabric_defect_hub_anomalib   # anomalib Engine's own working directory
  name: patchcore_pattern1-4
  registry_dir: artifacts/models   # the trained checkpoint is copied here as a stable file named <model_class>.ckpt
