# ============================================================================
# Ultralytics (YOLOv8n / YOLOv8s / YOLO11n) experiment config example.
#
# Usage (configuration-driven, not command-line flags):
#     from fabric_defect_hub.models.ultralytics import run_from_yaml
#     result = run_from_yaml("configs/models/ultralytics_example.yaml")
#     print(result.metrics)          # {'map50': ..., 'precision': ...}
#     print(result.registered_artifact.path)  # stable storage path of the trained model
#
# Only write the fields you want to change; anything you don't set falls
# back to the fabric preset (models/ultralytics/presets.py) and ultralytics'
# own defaults.
# ============================================================================

# ---- Model: variant and initial weights ----
model:
  variant: yolov8n        # yolov8n | yolov8s | yolo11n
  pretrained: true        # true = load COCO-pretrained weights for transfer learning; false = train from scratch
  offline: false           # true = forbid implicit downloads, error before training if weights are missing
  task: detect
  recipe: yolov8_sd_attn   # 注入特化学术 Recipe: SD-Attn + DLW 动态损失平衡
  loss_fn: AFDLoss         # 开启 Adaptive Focal-Dice Loss 解决微小瑕疵倾斜问题

# ---- Data: converted at runtime via DatasetAdapter (no need to pre-stage a YOLO dataset on disk) ----
data:
  dataset: zju-leaper
  # Falls back to data/ZJU-Leaper (this project's dataset symlink convention,
  # see training.DEFAULT_DATASET_ROOTS) if ${ZJU_LEAPER_ROOT} is not set.
  dataset_root: ${ZJU_LEAPER_ROOT}
  class_names: ["defect"]
  train_selection:        # constructor kwargs passed to ZJULeaperDataset
    split: train
    pattern: [pattern1, pattern2, pattern3, pattern4]   # spread the low-shot budget across textures instead of only pattern1's plain white background
    num_samples: 300
    defect_ratio: 1.0     # detection task: training set uses only defective images (with bboxes)
    task: detection
    seed: 0
  val_selection:
    split: test
    pattern: [pattern1, pattern2, pattern3, pattern4]
    num_samples: 100
    defect_ratio: 1.0
    task: detection
    seed: 0
  # Alternative: point directly at an existing YOLO data.yaml (mutually exclusive with dataset)
  # data_yaml: /path/to/data.yaml

# ---- Training hyperparameters (only the commonly-changed ones are listed; see presets.COMMON_FABRIC_TRAIN_DEFAULTS for the rest) ----
train:
  enabled: true
  epochs: 100
  imgsz: 640
  batch: 16
  patience: 30
  optimizer: auto
  lr0: 0.01
  cos_lr: true
  single_cls: true
  # device: 0             # "cpu" / 0 / "0,1"; omit to auto-select
  resume: false
  extra: {}               # any other ultralytics train() kwargs, passed through as-is

# ---- Validation / metric extraction (native YOLO val) ----
val:
  enabled: true
  split: val
  conf: 0.001
  iou: 0.6

# ---- Inference defaults (used by UltralyticsAdapter.predict) ----
predict:
  conf: 0.25
  iou: 0.7
  max_det: 300
  augment: false

# ---- Export (optional, after training; multiple formats) ----
export:
  enabled: false
  formats: [onnx]         # onnx | engine | torchscript | openvino ...
  half: false
  dynamic: false
  simplify: true
  # opset: 12
  # imgsz: 640

# ---- Run directory / model registry ----
checkpoint:
  project: runs/fabric_defect_hub
  name: yolov8n_pattern1-4
  registry_dir: artifacts/models   # the trained best.pt is copied here as a stable file
  exist_ok: false
